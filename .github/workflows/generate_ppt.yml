name: Generate POGZ PPTX

on:
  workflow_dispatch:    # 可以在 Actions 页面手动触发
  push:
    branches:
      - main            # 如需监听其他分支，请修改

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-pptx

      - name: Generate PPTX
        run: |
          # 期望脚本位于仓库根目录：generate_ppt.py
          # 脚本运行后会在工作目录生成 POGZ_presentation.pptx
          python generate_ppt.py

      - name: Upload PPTX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: POGZ_presentation
          path: POGZ_presentation.pptx

      # ---------- 可选：将生成的 PPTX 提交回仓库 ----------
